# Exported from Render on 2025-06-10T21:42:54Z
databases:
- name: arbitragem-db
  databaseName: arbitragem_banco
  user: arbitragem_banco_user
  plan: free
  region: oregon
  ipAllowList:
  - source: 0.0.0.0/0
    description: everywhere
  postgresMajorVersion: "16"

services:
  # Frontend Next.js
  - type: web
    name: arbitrack-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_WEBSOCKET_URL
        value: wss://arbitrack-worker.onrender.com
    healthCheckPath: /health

  # Worker de Arbitragem (WebSocket Server)
  - type: web
    name: arbitrack-worker
    env: node
    buildCommand: npm install
    startCommand: node worker/background-worker-fixed.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10001
    healthCheckPath: /health

version: "1"