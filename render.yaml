# Exported from Render on 2025-06-10T21:42:54Z
databases:
- name: arbitragem-db
  databaseName: arbitragem_banco
  user: arbitragem_banco_user
  plan: free
  region: oregon
  ipAllowList:
  - source: 0.0.0.0/0
    description: everywhere
  postgresMajorVersion: "16"


services:
- type: web
  name: robo-de-arbitragem
  env: node
  plan: free
  buildCommand: npm install && npm run build
  buildFilter:
    paths:
    - app/**
    - components/**
    - lib/**
    - public/**
    - package.json
    - next.config.js
    - tsconfig.json
    - prisma/**
    - middleware.ts
    - tailwind.config.ts
    - postcss.config.mjs
    - babel.config.js
    - .babelrc
    - .eslintrc.js
    - .eslintrc.json
    - eslint.config.mjs
    - .gitattributes
    - .gitignore
    - .npmrc
    - next-env.d.ts
    - README.md
    - render.yaml
    - tsconfig.build.json
    - tsconfig.prisma.json
    - tsconfig.scripts.json
    - tsconfig.server.json
    - tsconfig.tsbuildinfo
    - websocket-server.ts
    - websocket-server.js
    - server.js
    - dev-server.js
    - start-spread-monitor.js
    - monitor.js
    - monitor-logs.js
    - worker/**
    - scripts/**
    - src/**
    - data/**
    - dist/**
    - node_modules/**
    - .next/**
    - .git/**
    - logs.txt
    - logs_worker.txt
    - mexc_logs.txt
    - test-*.js
    - test-*.ts
    - test-*.html
    - *.md
    - ATUALIZACAO_*.md
    - CONFIGURACAO_*.md
    - CORRECAO_*.md
    - DIAGNOSTICO_*.md
    - ESTRATEGIA_*.md
    - LIMPEZA_*.md
    - MELHORIAS_*.md
    - OTIMIZACAO_*.md
    - PROBLEMA_*.md
    - RESULTADOS_*.md
    - RESUMO_*.md
    - SOLUCAO_*.md
    - TESTE_*.md
  startCommand: npm start
  envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: arbitragem-db
        property: connectionString
    - key: NEXT_PUBLIC_WEBSOCKET_URL
      value: wss://robo-de-arbitragem-tracker.onrender.com
    - key: PORT
      value: 10000
    - key: HOSTNAME
      value: 0.0.0.0
    - key: NODE_ENV
      value: production
    - key: TZ
      value: America/Sao_Paulo

- type: worker
  name: arbitrage-worker
  env: node
  plan: free
  buildCommand: npm install && npm run build:worker
  startCommand: npm run start:worker
  envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: arbitragem-db
        property: connectionString
    - key: PORT
      value: 8080
    - key: NODE_ENV
      value: production
    - key: HOSTNAME
      value: 0.0.0.0
    - key: TZ
      value: America/Sao_Paulo

- type: worker
  name: database-cleanup
  env: node
  plan: free
  buildCommand: npm install && npm run vacuum:build
  startCommand: npm run vacuum:start
  envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: arbitragem-db
        property: connectionString
    - key: NODE_ENV
      value: production
    - key: TZ
      value: America/Sao_Paulo

- type: worker
  name: robo-de-arbitragem-tracker
  env: node
  plan: free
  buildCommand: npm install && npm run build:worker
  startCommand: npm run start:worker
  envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: arbitragem-db
        property: connectionString
    - key: PORT
      value: 10000
    - key: HOSTNAME
      value: 0.0.0.0
    - key: NODE_ENV
      value: production
    - key: TZ
      value: America/Sao_Paulo

- type: cron
  name: arbitragem-render
  env: node
  plan: free
  buildCommand: npm install && npm run build:worker
  startCommand: npm run start:worker
  schedule: "*/5 * * * *"
  envVars:
    - key: DATABASE_URL
      fromDatabase:
        name: arbitragem-db
        property: connectionString
    - key: NODE_ENV
      value: production
    - key: TZ
      value: America/Sao_Paulo

version: "1"